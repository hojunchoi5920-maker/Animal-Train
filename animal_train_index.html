<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>동물 열차 컬렉션</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #fdf6e3;
            --panel-bg: #ffffff;
            --train-color: #8d6e63;
            --accent-color: #d84315;
            --border-color: #d7ccc8;
        }

        body { 
            font-family: 'Arial', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 20px;
            padding-bottom: 100px; /* QR 구역 공간 확보 */
        }

        h1 { color: #5d4037; margin-bottom: 10px; }
        
        /* 볼륨 컨트롤 구역 */
        #audio-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
            border: 2px solid var(--border-color);
            border-radius: 50px;
            padding: 10px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #sound-btn { cursor: pointer; font-size: 1.2em; user-select: none; }
        #volume-slider { cursor: pointer; width: 100px; accent-color: #d84315; }

        /* QR 코드 컨테이너 스타일 */
        #qr-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            text-align: center;
            z-index: 1000;
        }
        #qr-code img { margin: 0 auto; }
        .qr-label { font-size: 12px; margin-top: 5px; color: #5d4037; font-weight: bold; }

        #msg { margin-bottom: 20px; font-weight: bold; color: #795548; height: 30px; font-size: 1.3em; }

        #game-wrapper {
            display: flex;
            flex-direction: column;
            width: 95vw;
            max-width: 1600px;
            gap: 20px;
        }

        #main-play-area { 
            display: flex; 
            height: 420px; 
            border: 5px solid var(--border-color); 
            background: var(--panel-bg); 
            border-radius: 25px; 
            padding: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        #animals-zone { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            width: 140px; 
            justify-content: center; 
            border-right: 3px dashed var(--border-color); 
            padding-right: 20px; 
            align-items: center; 
        }
        .animal-slot { 
            width: 85px; height: 85px; 
            border: 2px dashed #bcaaa4; 
            border-radius: 15px; 
            display: flex; justify-content: center; align-items: center; 
            background: #fafafa; 
        }
        .animal { 
            width: 75px; height: 75px; 
            border-radius: 12px; cursor: grab; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 45px; background: #fff; 
            border: 2px solid #a1887f; 
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1); 
            user-select: none; 
        }
        
        #play-zone { 
            flex-grow: 1; 
            position: relative; 
            overflow: hidden; 
            display: flex; 
            align-items: flex-end; 
            padding-bottom: 50px; 
            margin: 0 20px;
        }
        #train-container { 
            display: flex; gap: 12px; 
            position: absolute; bottom: 60px; left: 30px; 
            transition: transform 2s ease-in-out, opacity 0.5s; 
            align-items: flex-end; 
        }
        .carriage { 
            width: 100px; height: 90px; 
            border: 5px solid #5d4037; border-radius: 10px 10px 15px 15px; 
            background: var(--train-color); 
            display: flex; justify-content: center; align-items: center; 
            font-size: 50px; position: relative; 
        }
        .carriage::before, .carriage::after { 
            content: ''; position: absolute; bottom: -12px; 
            width: 24px; height: 24px; background: #333; 
            border: 2px solid #000; border-radius: 50%; 
        }
        .carriage::before { left: 10px; }
        .carriage::after { right: 10px; }

        #goal-zone {
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            width: 150px; border-left: 3px dashed var(--border-color);
        }
        #flag { font-size: 80px; margin-bottom: 10px; }
        #counter-box { font-size: 28px; font-weight: bold; color: var(--accent-color); }

        #history-section {
            background: var(--panel-bg);
            border: 5px solid var(--border-color);
            border-radius: 25px;
            padding: 30px;
            min-height: 400px;
        }
        #history-title {
            font-size: 1.8em; font-weight: bold; color: #5d4037;
            margin-bottom: 30px; text-align: center;
        }
        #history-zone { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 25px; 
            justify-content: center;
        }
        
        .history-item { display: flex; align-items: center; gap: 15px; }
        .history-number {
            font-size: 24px; font-weight: bold; color: #8d6e63;
            background: #efebe9; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
        }
        .mini-train { 
            display: flex; gap: 8px; padding: 15px; 
            background: #fbe9e7; border: 3px solid #ffccbc; 
            border-radius: 20px; align-items: flex-end; 
            box-shadow: 3px 5px 10px rgba(0,0,0,0.08);
            flex-grow: 1;
        }
        .mini-carriage { 
            width: 60px; height: 55px; 
            border: 4px solid #5d4037; border-radius: 8px 8px 12px 12px; 
            background: #a1887f; display: flex; 
            justify-content: center; align-items: center; 
            font-size: 32px; position: relative; 
        }
        .mini-carriage::before, .mini-carriage::after { 
            content: ''; position: absolute; bottom: -8px; 
            width: 14px; height: 14px; background: #333; border-radius: 50%; 
        }
        .mini-carriage::before { left: 8px; }
        .mini-carriage::after { right: 8px; }

        .btn-group { display: flex; gap: 20px; margin-top: 20px; justify-content: center; padding-bottom: 40px; }
        button { 
            padding: 15px 40px; cursor: pointer; font-size: 1.2em; font-weight: bold; 
            border: none; border-radius: 15px; transition: 0.2s; 
            box-shadow: 0 4px 0 rgba(0,0,0,0.1); 
        }
        .btn-clear { background-color: #ffb74d; color: white; }
        .btn-reset { background-color: #ef5350; color: white; }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
    </style>
</head>
<body>

    <div id="audio-controls">
        <div id="sound-btn" onclick="toggleMute()">🔊</div>
        <input type="range" id="volume-slider" min="0" max="100" value="100" oninput="updateVolume()">
    </div>

    <div id="qr-container">
        <div id="qr-code"></div>
        <div class="qr-label">스캔하여 접속</div>
    </div>

    <h1>🚂 칙칙폭폭 동물 열차 컬렉션 🐰🐻🐯🦁</h1>
    <div id="msg">화면을 한 번 클릭한 후 동물을 태워보세요!</div>

    <div id="game-wrapper">
        <div id="main-play-area">
            <div id="animals-zone">
                <div class="animal-slot" data-slot="rabbit"><div class="animal" draggable="true" id="rabbit">🐰</div></div>
                <div class="animal-slot" data-slot="bear"><div class="animal" draggable="true" id="bear">🐻</div></div>
                <div class="animal-slot" data-slot="tiger"><div class="animal" draggable="true" id="tiger">🐯</div></div>
                <div class="animal-slot" data-slot="lion"><div class="animal" draggable="true" id="lion">🦁</div></div>
            </div>

            <div id="play-zone">
                <div id="train-container">
                    <div class="carriage" data-index="0"></div>
                    <div class="carriage" data-index="1"></div>
                    <div class="carriage" data-index="2"></div>
                    <div class="carriage" data-index="3"></div>
                </div>
            </div>

            <div id="goal-zone">
                <div id="flag">🚩</div>
                <div id="counter-box">성공: <span id="counter">0</span>개</div>
            </div>
        </div>

        <div id="history-section">
            <div id="history-title">도착한 기차 도감</div>
            <div id="history-zone"></div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-clear" onclick="resetBoardOnly()">기차 비우기</button>
        <button class="btn-reset" onclick="resetGameCompletely()">기록 전체 삭제</button>
    </div>

    <script>
        // --- 📱 QR 코드 생성 로직 ---
        window.onload = function() {
            new QRCode(document.getElementById("qr-code"), {
                text: window.location.href, // 현재 페이지 주소를 QR로 변환
                width: 100,
                height: 100
            });
        };

        // --- 🔊 오디오 로직 ---
        const sfxHorn = new Audio('https://cdn.pixabay.com/audio/2022/03/10/audio_559409890f.mp3');
        const sfxChug = new Audio('https://cdn.pixabay.com/audio/2022/03/19/audio_6060f64c67.mp3');
        const sfxError = new Audio('https://cdn.pixabay.com/audio/2021/08/04/audio_062637a898.mp3');
        sfxChug.loop = true;
        let isMuted = false;
        let lastVolume = 1.0; 
        setAllVolumes(1.0);

        function updateVolume() {
            const val = document.getElementById('volume-slider').value;
            const volume = val / 100;
            setAllVolumes(volume);
            const btn = document.getElementById('sound-btn');
            if (volume === 0) { btn.innerText = "🔇"; isMuted = true; } 
            else { btn.innerText = "🔊"; isMuted = false; lastVolume = volume; }
        }

        function toggleMute() {
            const btn = document.getElementById('sound-btn');
            const slider = document.getElementById('volume-slider');
            if (!isMuted) {
                lastVolume = slider.value / 100;
                setAllVolumes(0);
                slider.value = 0;
                btn.innerText = "🔇";
                isMuted = true;
                sfxChug.pause();
            } else {
                const restoreVal = lastVolume > 0 ? lastVolume : 1.0;
                setAllVolumes(restoreVal);
                slider.value = restoreVal * 100;
                btn.innerText = "🔊";
                isMuted = false;
            }
        }

        function setAllVolumes(vol) {
            sfxHorn.volume = vol; sfxChug.volume = vol; sfxError.volume = vol;
        }

        // --- 게임 로직 ---
        const carriages = document.querySelectorAll('.carriage');
        const trainContainer = document.getElementById('train-container');
        const counterDisplay = document.getElementById('counter');
        const historyZone = document.getElementById('history-zone');
        const msg = document.getElementById('msg');

        let arrivedOrders = new Set();
        let successCount = 0;
        let isMoving = false;

        document.addEventListener('dragstart', (e) => {
            if (isMoving) { e.preventDefault(); return; }
            if (e.target.classList.contains('animal')) {
                sfxHorn.play().then(() => { sfxHorn.pause(); sfxHorn.currentTime = 0; }).catch(() => {});
                e.dataTransfer.setData('animalId', e.target.id);
                e.target.style.opacity = "0.5";
            }
        });

        document.addEventListener('dragend', (e) => {
            if (e.target.classList.contains('animal')) e.target.style.opacity = "1";
        });

        const dropTargets = [...carriages, ...document.querySelectorAll('.animal-slot')];
        dropTargets.forEach(target => {
            target.addEventListener('dragover', (e) => e.preventDefault());
            target.addEventListener('drop', (e) => {
                e.preventDefault();
                if (isMoving) return;
                const animalId = e.dataTransfer.getData('animalId');
                const animalEl = document.getElementById(animalId);
                if (target.classList.contains('animal-slot')) {
                    if (target.dataset.slot === animalId) target.appendChild(animalEl);
                } 
                else if (target.classList.contains('carriage')) {
                    if (target.children.length > 0) {
                        const existing = target.children[0];
                        animalEl.parentElement.appendChild(existing);
                    }
                    target.appendChild(animalEl);
                    checkTrainFull();
                }
            });
        });

        function checkTrainFull() {
            const filled = Array.from(carriages).filter(c => c.children.length > 0);
            if (filled.length === 4) {
                const orderKey = Array.from(carriages).map(c => c.children[0].id).join('-');
                if (arrivedOrders.has(orderKey)) {
                    msg.innerText = "❌ 이미 도착했던 기차 순서입니다!";
                    msg.style.color = "#d32f2f";
                    if (!isMuted) { sfxError.currentTime = 0; sfxError.play(); }
                } else {
                    msg.innerText = "⭐ 멋진 기차네요! 출발합니다!";
                    msg.style.color = "#2e7d32";
                    isMoving = true;
                    launchTrain(orderKey);
                }
            }
        }

        function launchTrain(orderKey) {
            if (!isMuted) {
                sfxHorn.currentTime = 0;
                sfxHorn.play().catch(() => {});
                setTimeout(() => { if(isMoving && !isMuted) sfxChug.play().catch(() => {}); }, 500);
            }

            const moveDistance = document.getElementById('play-zone').offsetWidth - 350;
            trainContainer.style.transform = `translateX(${moveDistance}px)`;
            
            setTimeout(() => {
                arrivedOrders.add(orderKey);
                successCount++;
                counterDisplay.innerText = successCount;
                const emojiArray = Array.from(carriages).map(c => c.children[0].innerText);
                addMiniTrainToHistory(emojiArray, successCount);
                trainContainer.style.opacity = '0';
                setTimeout(() => { resetBoardOnly(); isMoving = false; }, 500);
            }, 2000);
        }

        function addMiniTrainToHistory(emojiArray, num) {
            const historyItem = document.createElement('div');
            historyItem.className = 'history-item';
            const numCircle = document.createElement('div');
            numCircle.className = 'history-number';
            numCircle.innerText = num;
            const miniTrain = document.createElement('div');
            miniTrain.className = 'mini-train';
            emojiArray.forEach(emoji => {
                const miniCarriage = document.createElement('div');
                miniCarriage.className = 'mini-carriage';
                miniCarriage.innerHTML = emoji;
                miniTrain.appendChild(miniCarriage);
            });
            historyItem.appendChild(numCircle);
            historyItem.appendChild(miniTrain);
            historyZone.appendChild(historyItem);
        }

        function resetBoardOnly() {
            sfxChug.pause(); sfxChug.currentTime = 0;
            trainContainer.style.transition = "none";
            trainContainer.style.transform = "translateX(0)";
            trainContainer.style.opacity = '1';
            document.querySelectorAll('.animal').forEach(a => {
                document.querySelector(`.animal-slot[data-slot="${a.id}"]`).appendChild(a);
            });
            setTimeout(() => { trainContainer.style.transition = "transform 2s ease-in-out, opacity 0.5s"; }, 50);
            msg.innerText = "동물들을 기차에 태워보세요!";
            msg.style.color = "#795548";
        }

        function resetGameCompletely() {
            if(confirm("모든 도감을 초기화하시겠습니까?")) {
                resetBoardOnly(); arrivedOrders.clear();
                successCount = 0; counterDisplay.innerText = "0";
                historyZone.innerHTML = "";
            }
        }
    </script>
</body>
</html>
